<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OCR手稿识别项目展示平台{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">📝</span>
            <span class="nav-title">OCR手稿识别项目展示平台</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">首页</a>
            <a href="/annotation" class="nav-link {% if request.path == '/annotation' %}active{% endif %}">数据标注</a>
            <a href="/training" class="nav-link {% if request.path == '/training' %}active{% endif %}">模型训练</a>
            <a href="/proofreading" class="nav-link {% if request.path == '/proofreading' %}active{% endif %}">人工校对</a>
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>OCR手稿识别项目展示平台 &copy; 2026</p>
    </footer>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
